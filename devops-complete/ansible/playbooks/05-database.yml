---
# Database Server (MariaDB) Playbook

- name: Configure MariaDB Database Server
  hosts: database
  become: true
  
  tasks:
    - name: Install MariaDB server
      dnf:
        name:
          - mariadb-server
          - mariadb
          - mariadb-backup
        state: present

    - name: Configure MariaDB
      copy:
        dest: /etc/my.cnf.d/server.cnf
        content: |
          [mysqld]
          datadir=/var/lib/mysql
          socket=/var/lib/mysql/mysql.sock
          log-error=/var/log/mariadb/mariadb.log
          pid-file=/var/run/mariadb/mariadb.pid
          character-set-server=utf8mb4
          collation-server=utf8mb4_unicode_ci
          max_connections=100
          bind-address=0.0.0.0
        mode: '0644'
      notify: restart mariadb

    - name: Create log directory
      file:
        path: /var/log/mariadb
        state: directory
        mode: '0755'

    - name: Enable and start MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

    - name: Wait for MariaDB to be ready
      wait_for:
        port: 3306
        delay: 5

    - name: Create database
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS devops_lab;"

    - name: Create database user
      shell: |
        mysql -e "CREATE USER IF NOT EXISTS 'devops_user'@'localhost' IDENTIFIED BY 'password';"
        mysql -e "GRANT ALL PRIVILEGES ON devops_lab.* TO 'devops_user'@'localhost';"
        mysql -e "FLUSH PRIVILEGES;"

    - name: Create sample data with employees table
      shell: |
        mysql devops_lab -e "CREATE TABLE IF NOT EXISTS employees (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(100), state VARCHAR(50), department VARCHAR(50), salary DECIMAL(10,2), created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('John Doe', 'California', 'Engineering', 75000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Jane Smith', 'Texas', 'Sales', 65000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Bob Johnson', 'New York', 'Marketing', 70000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Alice Williams', 'Florida', 'HR', 60000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Charlie Brown', 'Illinois', 'Engineering', 80000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Diana Ross', 'Georgia', 'Sales', 72000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Edward Lee', 'Washington', 'Operations', 68000.00);"
        mysql devops_lab -e "INSERT INTO employees (name, state, department, salary) VALUES ('Fiona Chen', 'California', 'Engineering', 85000.00);"

    - name: Allow MySQL through firewall
      firewalld:
        service: mysql
        permanent: yes
        state: enabled
      failed_when: false

  handlers:
    - name: restart mariadb
      service:
        name: mariadb
        state: restarted
