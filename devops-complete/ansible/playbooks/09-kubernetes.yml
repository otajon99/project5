---
# Kubernetes (Minikube) Playbook

- name: Configure Kubernetes Server (Minikube)
  hosts: kubernetes
  become: true
  
  tasks:
    - name: Install kubectl
      dnf:
        name:
          - kubectl
        state: present
      ignore_errors: yes

    - name: Install conntrack
      dnf:
        name: conntrack-tools
        state: present
      ignore_errors: yes

    - name: Install Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'
      ignore_errors: yes

    - name: Install Docker if not present
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
        state: present
      ignore_errors: yes

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
      ignore_errors: true

    - name: Add docker group to ansible user
      user:
        name: ansible
        groups: docker
        append: yes

    - name: Create .kube directory for ansible user
      file:
        path: /home/ansible/.kube
        state: directory
        owner: ansible
        group: ansible
        mode: '0755'

    - name: Start Minikube with Docker driver
      shell: |
        sg docker -c "minikube start --driver=docker --cpus=1 --memory=1536 --force"
      become_user: ansible
      ignore_errors: yes

    - name: Enable Minikube Ingress addon
      shell: sg docker -c "minikube addons enable ingress"
      become_user: ansible
      ignore_errors: yes

    - name: Enable Minikube dashboard addon
      shell: sg docker -c "minikube addons enable dashboard"
      become_user: ansible
      ignore_errors: yes

    - name: Enable Minikube metrics-server addon
      shell: sg docker -c "minikube addons enable metrics-server"
      become_user: ansible
      ignore_errors: yes

    - name: Wait for Minikube to be ready
      shell: sg docker -c "minikube status"
      become_user: ansible
      register: minikube_status
      until: minikube_status.rc == 0
      retries: 10
      delay: 15
      ignore_errors: yes

    - name: Get Minikube dashboard URL
      shell: sg docker -c "minikube dashboard --url"
      become_user: ansible
      register: dashboard_url
      ignore_errors: yes

    - name: Display Minikube status
      debug:
        msg: "Minikube dashboard available at: {{ dashboard_url.stdout }}"
      ignore_errors: yes
