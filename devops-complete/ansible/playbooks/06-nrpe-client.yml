---
# NRPE Client Playbook - Install on ALL servers for monitoring

- name: Install NRPE on all servers
  hosts: linux
  become: true
  
  tasks:
    - name: Install EPEL repository
      dnf:
        name: epel-release
        state: present

    - name: Install NRPE and Nagios plugins
      dnf:
        name:
          - nrpe
          - nagios-plugins
          - nagios-plugins-nrpe
          - nagios-plugins-disk
          - nagios-plugins-load
          - nagios-plugins-users
        state: present

    - name: Configure NRPE
      lineinfile:
        path: /etc/nagios/nrpe.cfg
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^allowed_hosts=', line: 'allowed_hosts=127.0.0.1,10.31.3.40' }
        - { regexp: '^dont_blame_nrpe=', line: 'dont_blame_nrpe=1' }
      notify: restart nrpe

    - name: Add NRPE commands
      blockinfile:
        path: /etc/nagios/nrpe.cfg
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          command[check_memory]=/usr/lib64/nagios/plugins/check_memory -w 90 -c 95
          command[check_disk]=/usr/lib64/nagios/plugins/check_disk -w 20% -c 10% -p /
          command[check_load]=/usr/lib64/nagios/plugins/check_load -r -w 1.5,1.0,0.5 -c 2.0,1.5,1.0
          command[check_users]=/usr/lib64/nagios/plugins/check_users -w 5 -c 10
      notify: restart nrpe

    - name: Enable and start NRPE service
      service:
        name: nrpe
        state: started
        enabled: yes

    - name: Configure firewall for NRPE
      firewalld:
        port: 5666/tcp
        permanent: yes
        state: enabled
      failed_when: false

  handlers:
    - name: restart nrpe
      service:
        name: nrpe
        state: restarted
