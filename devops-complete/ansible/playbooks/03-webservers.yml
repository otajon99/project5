---
# Web Servers Playbook (Apache)

- name: Configure Apache Web Servers
  hosts: webservers
  become: true
  
  tasks:
    - name: Install Apache and PHP
      dnf:
        name:
          - httpd
          - php
          - php-mysql
          - php-fpm
          - mod_ssl
        state: present

    - name: Configure Apache
      copy:
        dest: /etc/httpd/conf.d/lab.conf
        content: |
          ServerTokens Prod
          ServerSignature Off
          TraceEnable Off
        mode: '0644'
      notify: restart httpd

    - name: Create web directory
      file:
        path: /var/www/html
        state: directory
        mode: '0755'

    - name: Create custom index.html for load balancer testing
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>DevOps Lab - Web Server</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 20px;
                      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                      padding: 40px;
                      max-width: 600px;
                      text-align: center;
                  }
                  .server-id { font-size: 100px; margin-bottom: 20px; }
                  h1 { color: #333; margin-bottom: 20px; font-size: 2em; }
                  .info-grid {
                      display: grid;
                      grid-template-columns: 1fr 1fr;
                      gap: 15px;
                      margin: 30px 0;
                  }
                  .info-item {
                      background: #f8f9fa;
                      padding: 15px;
                      border-radius: 10px;
                      border-left: 4px solid #667eea;
                  }
                  .info-label { color: #666; font-size: 12px; text-transform: uppercase; }
                  .info-value { color: #333; font-size: 18px; font-weight: bold; margin-top: 5px; }
                  .status {
                      display: inline-block;
                      background: #10b981;
                      color: white;
                      padding: 8px 20px;
                      border-radius: 20px;
                      font-size: 14px;
                      margin-top: 20px;
                  }
                  .timestamp { color: #999; margin-top: 30px; font-size: 14px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="server-id">🌐</div>
                  <h1>DevOps Lab Web Server</h1>
                  <div class="info-grid">
                      <div class="info-item">
                          <div class="info-label">Server Name</div>
                          <div class="info-value">{{ ansible_hostname }}</div>
                      </div>
                      <div class="info-item">
                          <div class="info-label">IP Address</div>
                          <div class="info-value">{{ ansible_host }}</div>
                      </div>
                      <div class="info-item">
                          <div class="info-label">Server ID</div>
                          <div class="info-value">#{{ ansible_host.split('.')[-1] }}</div>
                      </div>
                      <div class="info-item">
                          <div class="info-label">Load Balancer</div>
                          <div class="info-value">HAProxy</div>
                      </div>
                  </div>
                  <div class="status">✓ Server is running</div>
                  <div class="timestamp">
                      <p>Server Time: <?php echo date('Y-m-d H:i:s'); ?></p>
                      <p>Powered by Apache on Rocky Linux</p>
                  </div>
              </div>
          </body>
          </html>
        mode: '0644'

    - name: Enable and start httpd
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Configure firewall for HTTP/HTTPS
      firewalld:
        service: "{{ item }}"
        permanent: yes
        state: enabled
      loop:
        - http
        - https
      failed_when: false

  handlers:
    - name: restart httpd
      service:
        name: httpd
        state: restarted
