---
# Base Security Role - Applied to all servers

- name: Disable SELinux
  selinux:
    state: disabled
  when: ansible_selinux.status is defined and ansible_selinux.status == 'enabled'

- name: Configure SELinux to permissive mode (if cannot disable)
  command: setenforce 0
  failed_when: false
  changed_when: false

- name: Ensure SELinux config is set to disabled
  lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: 'SELINUX=disabled'
  failed_when: false

- name: Configure Firewall
  firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
  loop:
    - ssh
    - http
    - https
  failed_when: false

- name: Enable and start firewalld
  service:
    name: firewalld
    state: started
    enabled: yes
  failed_when: false

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart sshd

- name: Disable password authentication (for key-based)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
  when: false
  notify: restart sshd

- name: Ensure SSH uses DNS
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?UseDNS'
    line: 'UseDNS no'
  notify: restart sshd

- name: Install common packages
  dnf:
    name: "{{ common_packages }}"
    state: present

- name: Configure password for ansible user
  user:
    name: ansible
    password: "{{ ansible_password | password_hash('sha512') }}"
    shell: /bin/bash
    groups: wheel
    append: yes

- name: Configure sudo for ansible user (no password)
  lineinfile:
    path: /etc/sudoers.d/ansible
    line: 'ansible ALL=(ALL) NOPASSWD: ALL'
    create: yes
    mode: '0440'

- name: Set root password
  user:
    name: root
    password: "{{ root_password | password_hash('sha512') }}"

- name: Configure DNS resolv.conf
  lineinfile:
    path: /etc/resolv.conf
    line: "{{ item }}"
    create: yes
  loop:
    - "nameserver {{ internal_dns }}"
    - "nameserver {{ external_dns[0] }}"
    - "nameserver {{ external_dns[1] }}"

- name: Add hosts file entries
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }} {{ item | replace('prdx-', '') }}"
  loop: "{{ groups['linux'] }}"

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Enable NTP service
  service:
    name: chronyd
    state: started
    enabled: yes

- name: Update locate database
  command: updatedb
  changed_when: false
  failed_when: false

- name: Restart sshd service
  service:
    name: sshd
    state: restarted
  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted
