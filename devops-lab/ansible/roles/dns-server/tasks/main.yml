---
# DNS Server Role

- name: Install BIND DNS server
  dnf:
    name:
      - bind
      - bind-utils
    state: present

- name: Configure named.conf
  template:
    src: named.conf.j2
    dest: /etc/named.conf
    mode: '0644'
  notify: restart named

- name: Create forward zone file
  template:
    src: zone.forward.j2
    dest: /var/named/forward.lab.local
    mode: '0640'
    group: named
  notify: restart named

- name: Create reverse zone file
  template:
    src: zone.reverse.j2
    dest: /var/named/reverse.100.168.192.in-addr.arpa
    mode: '0640'
    group: named
  notify: restart named

- name: Enable and start named service
  service:
    name: named
    state: started
    enabled: yes

- name: Configure firewall for DNS
  firewalld:
    service: dns
    permanent: yes
    state: enabled
  failed_when: false
