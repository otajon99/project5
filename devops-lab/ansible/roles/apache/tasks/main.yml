---
# Apache Web Server Role

- name: Install Apache and PHP
  dnf:
    name:
      - httpd
      - php
      - php-mysql
      - php-fpm
      - mod_ssl
    state: present

- name: Configure Apache
  template:
    src: httpd.conf.j2
    dest: /etc/httpd/conf/httpd.conf
    mode: '0644'
  notify: restart httpd

- name: Create web directory
  file:
    path: /var/www/html
    state: directory
    mode: '0755'

- name: Create custom index.html
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    mode: '0644'

- name: Enable and start httpd
  service:
    name: httpd
    state: started
    enabled: yes

- name: Configure firewall for HTTP/HTTPS
  firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
  loop:
    - http
    - https
  failed_when: false
