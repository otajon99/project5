---
# Nagios Monitoring Server Role

- name: Install Nagios Core and dependencies
  dnf:
    name:
      - nagios
      - nagios-plugins-all
      - nagios-plugins-nrpe
      - httpd
      - php
      - gd
      - gd-devel
    state: present

- name: Configure Nagios admin user
  lineinfile:
    path: /etc/nagios/passwd
    regexp: '^nagiosadmin'
    line: 'nagiosadmin:$2y$10$XXXXXXXXXXXXXXX'
    create: yes
  notify: restart nagios

- name: Configure Apache for Nagios
  template:
    src: nagios.conf.j2
    dest: /etc/httpd/conf.d/nagios.conf
    mode: '0644'
  notify: restart httpd

- name: Create Nagios configuration directory
  file:
    path: /etc/nagios/conf.d
    state: directory
    mode: '0755'

- name: Configure host groups
  template:
    src: hostgroups.cfg.j2
    dest: /etc/nagios/conf.d/hostgroups.cfg
    mode: '0644'
  notify: restart nagios

- name: Configure hosts
  template:
    src: hosts.cfg.j2
    dest: /etc/nagios/conf.d/hosts.cfg
    mode: '0644'
  notify: restart nagios

- name: Configure services
  template:
    src: services.cfg.j2
    dest: /etc/nagios/conf.d/services.cfg
    mode: '0644'
  notify: restart nagios

- name: Enable and start services
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - nagios
    - httpd

- name: Configure firewall for HTTP
  firewalld:
    service: http
    permanent: yes
    state: enabled
  failed_when: false

- name: Set Apache password
  htpasswd:
    path: /etc/nagios/passwd
    name: nagiosadmin
    password: "nagios"
    create: yes
  notify: restart nagios
